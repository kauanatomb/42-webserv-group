<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>413 Payload Too Large</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0d1117;
        color: #e5e7eb;
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 680px;
        background: #111827;
        border: 1px solid rgba(52, 211, 153, 0.25);
        border-radius: 16px;
        padding: 40px 28px;
        text-align: center;
      }

      .code {
        font-size: 4rem;
        font-weight: bold;
        color: #34d399;
        margin-bottom: 8px;
      }

      h1 {
        margin: 0 0 14px;
      }

      p {
        color: #9ca3af;
        line-height: 1.6;
        margin: 0 auto 10px;
        max-width: 560px;
      }

      a {
        display: inline-block;
        margin-top: 18px;
        text-decoration: none;
        color: #e5e7eb;
        border: 1px solid rgba(52, 211, 153, 0.25);
        border-radius: 10px;
        padding: 10px 14px;
      }

      a:hover {
        border-color: #34d399;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="code">413</div>
      <h1>Payload Too Large</h1>
      <p>
        The request body exceeds the maximum size allowed by this server
        configuration.
      </p>
      <p>
        Try sending a smaller file or reduce the request payload before trying
        again.
      </p>
      <a href="/">Return to Control Panel</a>
    </main>
  </body>
</html>
