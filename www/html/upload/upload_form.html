<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Upload</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0d1117;
        color: #e5e7eb;
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 480px;
        background: #111827;
        border: 1px solid rgba(52, 211, 153, 0.25);
        border-radius: 16px;
        padding: 40px 28px;
        text-align: center;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 1.5rem;
      }

      .drop-zone {
        border: 2px dashed rgba(52, 211, 153, 0.3);
        border-radius: 12px;
        padding: 40px 20px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
      }

      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: #34d399;
        background: rgba(52, 211, 153, 0.05);
      }

      .drop-zone p {
        color: #9ca3af;
        margin: 0 0 12px;
        line-height: 1.6;
      }

      .drop-zone .filename {
        color: #34d399;
        font-size: 0.9rem;
        margin-top: 8px;
        min-height: 1.2em;
      }

      input[type="file"] {
        display: none;
      }

      .browse-btn {
        display: inline-block;
        color: #34d399;
        border: 1px solid rgba(52, 211, 153, 0.4);
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      .browse-btn:hover {
        background: rgba(52, 211, 153, 0.1);
      }

      button[type="submit"] {
        display: block;
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background: #34d399;
        color: #0d1117;
        font-weight: bold;
        font-size: 1rem;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      button[type="submit"]:hover {
        opacity: 0.85;
      }

      button[type="submit"]:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      #msg {
        margin-top: 16px;
        font-size: 0.9rem;
        min-height: 1.2em;
      }

      .error {
        color: #f87171;
      }

      a.back {
        display: inline-block;
        margin-top: 18px;
        text-decoration: none;
        color: #e5e7eb;
        border: 1px solid rgba(52, 211, 153, 0.25);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 0.85rem;
      }

      a.back:hover {
        border-color: #34d399;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Upload a File</h1>
      <form
        id="upload-form"
        action="/upload"
        method="POST"
        enctype="multipart/form-data"
      >
        <div class="drop-zone" id="drop-zone">
          <p>Drag &amp; drop a file here or</p>
          <span class="browse-btn" id="browse-btn">Browse files</span>
          <div class="filename" id="filename"></div>
          <input type="file" name="file" id="file-input" required />
        </div>
        <button type="submit" id="submit-btn" disabled>Upload</button>
      </form>
      <div id="msg"></div>
      <a class="back" href="/">Return to Control Panel</a>
    </main>
    <script>
      var dropZone = document.getElementById("drop-zone");
      var fileInput = document.getElementById("file-input");
      var filename = document.getElementById("filename");
      var submitBtn = document.getElementById("submit-btn");
      var browseBtn = document.getElementById("browse-btn");

      browseBtn.addEventListener("click", function () {
        fileInput.click();
      });

      dropZone.addEventListener("click", function (e) {
        if (e.target === dropZone || e.target.tagName === "P")
          fileInput.click();
      });

      fileInput.addEventListener("change", function () {
        if (fileInput.files.length) {
          filename.textContent = fileInput.files[0].name;
          submitBtn.disabled = false;
        }
      });

      dropZone.addEventListener("dragover", function (e) {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });

      dropZone.addEventListener("dragleave", function () {
        dropZone.classList.remove("dragover");
      });

      dropZone.addEventListener("drop", function (e) {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        if (e.dataTransfer.files.length) {
          fileInput.files = e.dataTransfer.files;
          filename.textContent = e.dataTransfer.files[0].name;
          submitBtn.disabled = false;
        }
      });

      document
        .getElementById("upload-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          var form = this;
          var msg = document.getElementById("msg");
          var data = new FormData(form);
          var xhr = new XMLHttpRequest();
          xhr.open("POST", form.action);
          xhr.onload = function () {
            if (xhr.status === 201) {
              window.location.href = "/files";
            } else {
              msg.className = "error";
              msg.textContent = "Error: " + xhr.status + " " + xhr.statusText;
            }
          };
          xhr.onerror = function () {
            msg.className = "error";
            msg.textContent = "Upload failed";
          };
          xhr.send(data);
        });
    </script>
  </body>
</html>
